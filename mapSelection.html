<!DOCTYPE html>
<html>

<head>
    <title>Map Selection</title>
</head>

<body>
    <h1>Map Selection</h1>
    <p>
      Choose the map you need 
    </p>
    <div>
        <h2 id="discoveryPark"><a href="selectedMap.html?building=discoveryPark">Discovery Park</a></h2>
        <p>Mainly for Engineering, Computer Science, and Information Technology classes</p>
        <img src="FirstFloorDP.png" alt="Snapshot of first floor of Discovery Park">
    </div>
    <!-- Script for dynamically responding to user-selected map -->
    <script>
        const url = new URLSearchParams(window.location.search);
        const building = url.get('building');

        if (!building)
        {
            window.location.href = 'mapSelection.html';
        }

        document.getElementById('building-title').textContent = building;
    </script>
</body>

</html>
